name: Update Cangjingge

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch opportunities
        run: python scripts/fetch_opportunities.py

      - name: Generate site
        run: python scripts/generate_site.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/opportunities.json docs/index.html
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update opportunities"
            git push
          fi
